name: Lint rust

inputs:
    cargo-toml-folder:
        description: "folder that contains the target Cargo.toml file"
        required: true
        type: string
    github-token:
        description: "github token"
        required: false
        type: string

runs:
    using: "composite"
    steps:
        - uses: actions/checkout@v4

        # Inlined: the standalone `install-rust-and-protoc` composite was
        # referenced for years but never lived in the repo, so every
        # lint-rust run failed with "Can't find 'action.yml'". We need
        # exactly the rust toolchain + protoc; install both directly.
        - name: Install Rust toolchain
          uses: dtolnay/rust-toolchain@stable

        - name: Install protoc
          uses: arduino/setup-protoc@v3
          with:
              version: "25.1"
              repo-token: ${{ inputs.github-token }}

        - uses: actions/cache@v4
          with:
              path: ${{ inputs.cargo-toml-folder }}/target
              # this action should be used on the most common runner only
              key: x86_64-unknown-linux-gnu-${{ inputs.cargo-toml-folder }}

        - run: cargo fmt --all -- --check
          working-directory: ${{ inputs.cargo-toml-folder }}
          shell: bash

        - run: cargo clippy --all-features --all-targets -- -D warnings
          working-directory: ${{ inputs.cargo-toml-folder }}
          shell: bash

          # We run clippy without features
        - run: cargo clippy --all-targets -- -D warnings
          working-directory: ${{ inputs.cargo-toml-folder }}
          shell: bash

        - run: |
              cargo update
              cargo install --locked cargo-deny
              cargo deny check --config ${GITHUB_WORKSPACE}/deny.toml
          working-directory: ${{ inputs.cargo-toml-folder }}
          shell: bash

        - name: doc
          shell: bash
          working-directory: ${{ inputs.cargo-toml-folder }}
          run: cargo doc --no-deps --document-private-items
          env:
              RUSTDOCFLAGS: -Dwarnings
